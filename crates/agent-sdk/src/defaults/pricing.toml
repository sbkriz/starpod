# Default model pricing (USD per million tokens).
#
# Override at runtime by placing a pricing.toml in your config directory
# (e.g. .starpod/config/pricing.toml). Per-model entries override defaults;
# unspecified models fall back to these values.
#
# Schema:
#   [<provider>]
#   cache_read_multiplier  = <float>   # relative to input rate (0.1 = 10%)
#   cache_creation_multiplier = <float>
#
#   [<provider>.models.<model-name>]
#   input  = <float>   # USD per million input tokens
#   output = <float>   # USD per million output tokens
#   # Optional per-model cache overrides:
#   # cache_read_multiplier = <float>
#   # cache_creation_multiplier = <float>

# ── Anthropic ──────────────────────────────────────────────────────────

[anthropic]
cache_read_multiplier = 0.1
cache_creation_multiplier = 1.25

[anthropic.models.claude-opus-4-6]
input = 15.0
output = 75.0

[anthropic.models.claude-sonnet-4-5]
input = 3.0
output = 15.0

[anthropic.models.claude-haiku-4-5]
input = 0.25
output = 1.25

# ── OpenAI ─────────────────────────────────────────────────────────────

[openai]
cache_read_multiplier = 0.5
cache_creation_multiplier = 1.0

[openai.models.gpt-4o]
input = 2.5
output = 10.0

[openai.models.gpt-4o-mini]
input = 0.15
output = 0.6

[openai.models."gpt-4.1"]
input = 2.0
output = 8.0

[openai.models.o3]
input = 10.0
output = 40.0

[openai.models.o4-mini]
input = 1.1
output = 4.4

# ── Gemini ─────────────────────────────────────────────────────────────

[gemini]
cache_read_multiplier = 0.25
cache_creation_multiplier = 1.0

[gemini.models.gemini-2-5-flash]
input = 0.15
output = 0.6

[gemini.models.gemini-2-5-pro]
input = 1.25
output = 10.0

# ── OpenAI-compatible providers ────────────────────────────────────────
# These use the OpenAI wire format but have their own pricing.

[groq]

[groq.models.llama-3-70b]
input = 0.59
output = 0.79

[deepseek]

[deepseek.models.deepseek-chat]
input = 0.27
output = 1.10

[deepseek.models.deepseek-reasoner]
input = 0.55
output = 2.19

# Model catalog — single source of truth for supported models.
#
# This file defines every model the system knows about: pricing, capabilities,
# and provider metadata. Override at runtime with a models.toml in your config
# directory (e.g. .starpod/config/models.toml).
#
# Schema:
#   [<provider>]
#   default_model = "<model-id>"          # default for this provider
#   api_key_env   = "<ENV_VAR>"           # env var for the API key (optional)
#   cache_read_multiplier  = <float>      # relative to input rate (0.1 = 10%)
#   cache_creation_multiplier = <float>
#
#   [<provider>.models.<model-id>]
#   input  = <float>                      # USD per million input tokens
#   output = <float>                      # USD per million output tokens
#   context_window = <int>                # max tokens in context (optional)
#   supports_tool_use = <bool>            # (default: true)
#   supports_vision = <bool>              # (default: false)
#   # Optional per-model cache overrides:
#   # cache_read_multiplier = <float>
#   # cache_creation_multiplier = <float>

# ── Anthropic ──────────────────────────────────────────────────────────

[anthropic]
default_model = "claude-haiku-4-5"
api_key_env = "ANTHROPIC_API_KEY"
cache_read_multiplier = 0.1
cache_creation_multiplier = 1.25

[anthropic.models.claude-opus-4-6]
input = 15.0
output = 75.0
context_window = 200000
supports_vision = true

[anthropic.models.claude-sonnet-4-6]
input = 3.0
output = 15.0
context_window = 200000
supports_vision = true

[anthropic.models.claude-sonnet-4-5]
input = 3.0
output = 15.0
context_window = 200000
supports_vision = true

[anthropic.models.claude-haiku-4-5]
input = 0.25
output = 1.25
context_window = 200000
supports_vision = true

